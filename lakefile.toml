name = "TauCeti"
defaultTargets = ["TauCeti"]

# mathlib's `rev` below stays on "master", never a pinned commit. The actual revision is
# pinned in lake-manifest.json; "master" is only the branch the daily bump moves forward
# along, and bump-guard (scripts/check-bump.sh) requires it to validate and auto-merge a bump.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "master"

# AI-owned: all the mathematics. No sorries (enforced in CI).
# This glob is AUTHORITATIVE for what gets built and axiom-audited: `lake build` builds
# every TauCeti/*.lean directly, and the axiom audit enumerates the source tree, so an
# orphaned/broken module still fails the build. The root TauCeti.lean re-exports nothing
# and is intentionally empty — a PR never has to touch it, and no code imports it.
[[lean_lib]]
name = "TauCeti"
globs = ["TauCeti.*"]
# `longFile = 1500` is the hard ceiling the in-build linter enforces for every file. A
# *newly added* file is held to a tighter 1000-line limit by the "New-file length guard" in
# `.github/workflows/pr-build.yml`; only files that already exist may grow up to 1500. Both
# `longFile` and `longFileDefValue` must be set to the same value, or the linter nags to
# remove a `set_option` on every short file (fatal under `warningAsError`).
leanOptions = { weak.linter.mathlibStandardSet = true, weak.linter.style.longFile = 1500, weak.linter.style.longFileDefValue = 1500, weak.linter.style.header = false, warningAsError = true }


# Human-owned governance: the axiom-allowlist audit (`lake exe axioms`). Inspects the
# built `TauCeti` environment and rejects any axiom outside the standard allowlist
# (catches sorry, native_decide, and home-rolled axioms). Run in CI after the build.
[[lean_exe]]
name = "axioms"
root = "scripts.Axioms"

# Human-owned governance: the module-system audit (`lake exe module-system`). Inspects the
# built `TauCeti` `.olean`s and rejects any module whose `ModuleData.isModule` flag is false,
# i.e. any file that did not opt into the Lean module system with a leading `module`. Reads the
# compiled artifact, not the source text, so a stray comment cannot fool it. Run in CI after
# the build, alongside the axiom audit.
[[lean_exe]]
name = "module-system"
root = "scripts.ModuleSystem"
