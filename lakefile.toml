name = "TauCeti"
defaultTargets = ["TauCeti"]

# mathlib's `rev` below stays on "master", never a pinned commit. The actual revision is
# pinned in lake-manifest.json; "master" is only the branch the daily bump moves forward
# along, and bump-guard (Scripts/check-bump.sh) requires it to validate and auto-merge a bump.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "63b065c2a061e7286444690d8c427f79cd6d5b6d"

# AI-owned: all the mathematics. No sorries (enforced in CI).
# This glob is AUTHORITATIVE for what gets built and axiom-audited: `lake build` builds
# every TauCeti/*.lean directly, and the axiom audit enumerates the source tree, so an
# orphaned/broken module still fails the build. The root TauCeti.lean re-exports nothing
# and is intentionally empty — a PR never has to touch it, and no code imports it.
[[lean_lib]]
name = "TauCeti"
globs = ["TauCeti.*"]
leanOptions = { weak.linter.mathlibStandardSet = true, weak.linter.style.longFile = 1000, weak.linter.style.longFileDefValue = 1000, weak.linter.style.header = false, warningAsError = true }


# Human-owned governance: the axiom-allowlist audit (`lake exe axioms`). Inspects the
# built `TauCeti` environment and rejects any axiom outside the standard allowlist
# (catches sorry, native_decide, and home-rolled axioms). Run in CI after the build.
[[lean_exe]]
name = "axioms"
root = "Scripts.Axioms"
