# formalization.yaml (v0.2): repo-root metadata for formalization projects.
# [required] fields should be filled; everything else is optional.
#
# NOTE: Tau Ceti is an open-ended, continuously evolving library, not the
# formalization of a fixed target. Many fields below therefore describe an ongoing
# process and an aspiration rather than a finished artifact. They are filled in as
# best we can and will drift as the library grows.

version: "v0.2"

# project - the formalization itself (not the source).
project:
  name: "Tau Ceti"     # [required]
  authors:                     # [required] who did the formalization
    - "AI author agents (the Lean code under TauCeti/)"
    - "Human stewards (roadmaps, CI, review), TauCetiProject"
  license: "Apache-2.0"        # [required]

# sources - what was formalized.
# Tau Ceti has no single fixed source. Its specification is its own
# human-authored, human-reviewed roadmaps in the TauCetiRoadmap repo, which play the role
# of blueprints and themselves cite the mathematical literature.
sources:                       # [required] list of sources
  - title: "Tau Ceti roadmaps (human-curated)"   # [required]
    authors: ["Tau Ceti human stewards"]         # [required]
    id: "https://github.com/TauCetiProject/TauCetiRoadmap"  # [required]
    type: "blueprint"
    license: "Apache-2.0"
    author_contacted: "n/a"
    prior_work: "Downstream of Mathlib (https://github.com/leanprover-community/mathlib4); individual roadmaps vendor/cite specific Mathlib PRs and standard texts."

# how it was produced
automation:
  method: "autonomous"         # [required] AIs author and review the code; humans curate roadmaps and rubrics
  models: []                   # open to any/all models; contributors vary, so not fixed
  framework: ""                # varies by contributor (e.g. Claude Code, and others)
  cost:
    wall_time: "ongoing"
    spend_usd: "ongoing; varies by contributor"
    hardware: "API- and subscription-based; varies by contributor"
  notes: >
    Open, multi-agent library. AIs own the code under TauCeti/: they initiate pull
    requests and shepherd them through an AI-driven review process. Humans own the
    roadmaps (the TauCetiRoadmap repo: markdown plus sorry-allowed Lean target signatures)
    and the review rubrics (the TauCetiReview repo), and may raise issues against the code.
    The human/AI split is enforced by CODEOWNERS and branch protection; the main
    branch is always green. No single harness or model is mandated.

# project status
status:
  scope: >
    All of mathematics: past, present, and emerging. Tau Ceti is an
    open-ended, continuously evolving library downstream of Mathlib, not the
    formalization of a fixed target.
  sorry_count: 0               # the code library (TauCeti/) forbids sorry; CI enforces this
  sorry_in_definitions: 0
  axioms:                      # the permitted allowlist (policy); current bootstrap content uses no non-standard axioms
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
  main_results: []             # none yet, since the library is bootstrapping; results will be listed here as they land

# fidelity
fidelity:
  divergences: >
    Not applicable in the usual sense: there is no fixed source to diverge from. The
    human-authored roadmaps are the specification, and TauCeti/ may freely generalize.
    Where a roadmap target needs material that lives only in an open or closed Mathlib
    PR, that material is vendored here with attribution rather than waited on.

# review status
review:
  status: "agent-reviewed"     # [required] intended process: AI peer review against human-authored rubrics
  reviewers:
    - "AI author agents (peer review of code PRs)"
    - "Human stewards (rubrics in the TauCetiReview repo; review of roadmap PRs)"
  notes: >
    Code PRs into TauCeti/ are peer-reviewed by AI agents against rubrics authored by
    humans (the TauCetiReview repo). Merging requires a green CI run (build against pinned
    Mathlib; no sorry/admit/sorryAx in TauCeti/; and TauCeti/ may not import the
    roadmap/review trees) plus code-owner review, enforced by branch protection.
    Human-governed paths are human-reviewed. The library is bootstrapping, so little
    has been reviewed yet.

# alignment - how source statements map to formal declarations.
alignment:
  note: >
    The human-authored roadmaps in the TauCetiRoadmap repo are the closest thing to a
    blueprint. Each roadmap (e.g. UniversalCovers, JacobianChallenge, ReductiveGroups)
    states its goals as sorry-allowed signatures in its Targets.lean; the matching
    sorry-free development lives (or will live) under TauCeti/.
  roadmaps: "https://github.com/TauCetiProject/TauCetiRoadmap"
