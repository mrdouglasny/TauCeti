name: debug-rc
on:
  pull_request_review_comment:
    types: [created]
jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "event_name=${{ github.event_name }}"
          echo "comment_user=${{ github.event.comment.user.login }}"
          echo "pr_user=${{ github.event.pull_request.user.login }}"
          echo "assoc=${{ github.event.comment.author_association }}"
          echo "pr_present=${{ github.event.pull_request != null }}"
          echo "sender=${{ github.event.sender.login }}"
