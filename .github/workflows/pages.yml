name: Pages

# Build the Verso website in web/ and deploy it to GitHub Pages.
#
# The site project (web/) depends only on Verso. The type-checked theorem snippets are
# extracted by SubVerso from web/examples/ — a separate project that imports the real
# TauCeti library (and hence Mathlib) — so the showcased mathematics is elaborated at
# build time and cannot drift. The examples project is built first; its Mathlib oleans
# come from the cache, not a from-scratch rebuild.
#
# The Statistics page's two "lines of code by date" charts are regenerated here, at
# deploy time, straight from git history (see scripts/loc_graph.py) — they are not
# committed state. The daily `schedule` below redeploys the site so the charts track
# the project as it grows. (This replaces the old loc-graph workflow, which committed
# the SVGs to main on a schedule; main now sits behind a merge queue that refuses
# direct pushes, so generating the charts in this build is the only way they refresh.)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'scripts/loc_graph.py'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC: refresh the lines-of-code charts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      # Full history: scripts/loc_graph.py reconstructs the whole "lines by date"
      # series by walking every commit, so a shallow checkout would truncate the charts.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone the roadmap repository (full history, for its chart)
        working-directory: ${{ github.workspace }}
        run: git clone --quiet https://github.com/TauCetiProject/TauCetiRoadmap.git /tmp/roadmap

      # Overwrites the checked-in SVGs in the runner only (never committed back). The
      # versions tracked in web/static_files/ are just fallback snapshots so a local
      # `cd web && lake exe web` renders something; refresh them by running these same
      # two commands. The deployed charts always come from this step, not from the repo.
      - name: Regenerate the lines-of-code charts into static_files
        working-directory: ${{ github.workspace }}
        run: |
          python3 scripts/loc_graph.py \
            --repo . --ref HEAD \
            --title "Tau Ceti — lines of Lean" --accent "#ff9d4d" \
            --out web/static_files/loc-tauceti.svg \
            TauCeti TauCeti.lean
          python3 scripts/loc_graph.py \
            --repo /tmp/roadmap --ref HEAD \
            --title "Tau Ceti Roadmap — lines written" --accent "#5eead4" \
            --out web/static_files/loc-roadmap.svg \
            TauCetiRoadmap TauCetiRoadmap.lean

      - name: Install elan
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh -o elan-init.sh
          chmod +x elan-init.sh
          ./elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake builds (site + examples)
        uses: actions/cache@v4
        with:
          path: |
            web/.lake
            web/examples/.lake
          key: web-lake-${{ runner.os }}-${{ hashFiles('web/lake-manifest.json', 'web/lean-toolchain', 'web/examples/lake-manifest.json', 'web/examples/lean-toolchain') }}
          restore-keys: web-lake-${{ runner.os }}-

      - name: Fetch Mathlib oleans (examples project)
        working-directory: web/examples
        run: lake exe cache get

      - name: Build examples project (checks the showcased TauCeti theorems)
        working-directory: web/examples
        run: lake build

      - name: Build site (extracts the checked snippets, compiles Verso)
        run: lake build

      - name: Generate static site
        run: lake exe web --output _out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/_out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
