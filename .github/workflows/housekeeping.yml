name: Queue Housekeeping

# Tidies the PR queue so the autonomous worker can stay focused on producing work.
# review.yml already auto-merges green PRs; this covers the other two janitorial jobs:
#   abandon  Close any open PR the review engine labelled `review-budget-spent` (it used its full
#            review budget without going green; the engine clears the label if a later round fixes it).
#            The branch is kept; the comment says it is fine to open a fresh PR after another look.
#   dedup    Close a newer PR that authors the same roadmap target (the <!--tauceti-target:v1 ...-->
#            body marker) as an older open one; keep the lowest PR number.
#   stale    Close a PR whose latest review scoreboard is changes-requested/blocked and that has had
#            no activity for STALE_DAYS (default 7).
# The only opt-out is a `keep` (or hold/wip/human/do-not-close) label; human activity alone does not
# spare a PR. abandon is a server-side label query (one request, independent of total open-PR count),
# and a failed close makes the job exit nonzero. Run it manually first with the dry-run input to preview.

on:
  schedule:
  - cron: "20 */2 * * *"   # every two hours, offset from the daily bump
  workflow_dispatch:
    inputs:
      dry-run:
        description: "List what would be closed without closing it"
        type: boolean
        default: false

jobs:
  housekeeping:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: TauCetiProject

      - uses: actions/checkout@v4

      - name: Abandon stuck PRs and close duplicates
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry-run && '1' || '' }}
        run: python3 scripts/housekeeping.py
