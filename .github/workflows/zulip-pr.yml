name: Zulip PR status (lifecycle)

# Maintain the per-PR message + emoji in the "Tau Ceti" Zulip channel as a PR is
# opened, reopened, merged, or closed. CI- and review-status changes are handled
# by zulip-pr-status.yml; this one owns the message's existence and its
# merged/closed lifecycle. Updates are cosmetic and never fail anything.

on:
  pull_request_target:
    types: [opened, reopened, closed]

permissions:
  contents: read        # checkout the script
  pull-requests: read   # read PR state
  statuses: read        # read the `build` commit status

# Serialize all Zulip updates for a given PR head across both zulip workflows, so
# two events can't interleave and leave conflicting reactions. Don't cancel: each
# run reconciles from fresh truth, and we want the last word, not a dropped one.
concurrency:
  group: zulip-pr-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  zulip-pr:
    if: github.repository == 'FormalFrontier/TauCeti'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/zulip
      - name: Reconcile Zulip reactions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          ZULIP_EMAIL: ${{ secrets.ZULIP_EMAIL }}
          ZULIP_SITE: https://leanprover.zulipchat.com
          PR: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
        run: |
          # Create the message when a PR opens/reopens; otherwise only react to it.
          CREATE=""
          if [ "$ACTION" != "closed" ]; then CREATE="--create"; fi
          python3 scripts/zulip/zulip_pr_status.py reconcile "$PR" $CREATE
