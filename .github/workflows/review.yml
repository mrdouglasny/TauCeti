name: Review

on:
  workflow_run:
    workflows: ["pr-build"]
    types: [completed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    # Fire after the sandboxed pr-build succeeds, or on a `/review` comment. The job-level `if`
    # filters only by event type; ALL authorization happens inside the step (the repository
    # permission API, reliable regardless of public/private org membership, with author_association
    # as a fallback so /review never regresses). Author CONTESTS (a reply in a rubric thread) are no
    # longer handled here: the local worker (tauceti) owns contest re-reviews so they have a single
    # execution owner and one durable watermark, rather than racing a CI run.
    if: >
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'pull_request_target')
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && contains(github.event.comment.body, '/review'))
    outputs:
      pr: ${{ steps.r.outputs.pr }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass attacker-controlled comment text via env, never inline, to avoid shell injection.
          COMMENT_BODY: ${{ github.event.comment.body }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          actor=$(jq -r '.sender.login // ""' "$GITHUB_EVENT_PATH")
          assoc=$(jq -r '.comment.author_association // ""' "$GITHUB_EVENT_PATH")
          # Authorized iff the actor has write+ access to the repo. The permission API returns the
          # effective role regardless of public/private membership; if that call cannot be made
          # (token scope), fall back to the webhook's author_association so /review never regresses.
          authorized() {
            local perm
            perm=$(gh api "repos/$REPO/collaborators/$actor/permission" --jq '.permission' 2>/dev/null || echo "")
            case "$perm" in admin|write|maintain) return 0 ;; esac
            case "$assoc" in OWNER|MEMBER|COLLABORATOR) return 0 ;; esac
            return 1
          }
          if [ "$EVENT" = "issue_comment" ]; then
            # Exact command only: some line of the comment must be exactly "/review"
            # (optional surrounding whitespace). A "/review" mentioned in prose does not trigger.
            if ! printf '%s' "$COMMENT_BODY" | grep -qxE '[[:space:]]*/review[[:space:]]*'; then
              echo "comment contains '/review' but not as an exact command; skipping"; exit 0
            fi
            if authorized; then
              echo "pr=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            else
              echo "unauthorized /review by $actor; skipping"
            fi
          else
            pr="${{ github.event.workflow_run.pull_requests[0].number }}"
            if [ -z "$pr" ]; then
              pr=$(gh api "repos/$REPO/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number // empty')
            fi
            echo "pr=$pr" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: resolve
    # GENERATING reviews in CI spends API budget, so it is OFF unless the repo variable
    # CI_REVIEW_ENABLED is set to 'true'. While off, reviews are run from the command line
    # (tauceti-review in TauCetiReview, or tauceti from TauCetiWorker). Merging is independent:
    # auto-merge.yml merges a green PR regardless of this gate. Re-enable by setting the variable.
    if: ${{ vars.CI_REVIEW_ENABLED == 'true' && needs.resolve.outputs.pr != '' }}
    # Pinned to a TauCetiReview commit; bump deliberately (an unpinned @main lets an upstream change
    # break every contributor's review at once, and this workflow inherits TauCeti's secrets).
    uses: FormalFrontier/TauCetiReview/.github/workflows/review.yml@21f3525b96c22030f5b5b49307867b903cab28dc
    with:
      pr: ${{ needs.resolve.outputs.pr }}
      trigger: ${{ github.event_name }}
      # Merging is handled by auto-merge.yml (the single merge path), so generation never merges.
      enable_automerge: false
    secrets: inherit
