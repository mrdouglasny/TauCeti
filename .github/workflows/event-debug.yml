name: event-debug
on:
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
permissions: { contents: read }
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "event=${{ github.event_name }} action=${{ github.event.action }} cid=${{ github.event.comment.id }} inreply=${{ github.event.comment.in_reply_to_id }}"'
