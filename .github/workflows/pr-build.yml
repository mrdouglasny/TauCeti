name: pr-build

# Builds untrusted PR code in a TRUSTED, base-branch-defined workflow. A PR cannot change what
# runs here (pull_request_target uses the base definition). The build/audit configuration
# (lakefile, scripts/, manifest, toolchain) is always the TRUSTED base's: we overlay only the
# PR's `TauCeti/` sources onto a base checkout and build that. Any PR touching anything outside
# `TauCeti/` is routed to a human (it can't be validated with trusted config). PR `TauCeti/` code
# compiles only under landrun (offline; writes confined to base/.lake; no secrets or token in
# reach). The `build` commit status on the PR head SHA is the required merge check.
#
# Live on pull_request_target (fires for all PRs, incl. forks, from the trusted base definition).
# workflow_dispatch is also kept for ad-hoc re-testing of a given PR number.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  # The merge queue tests a batch (one or more PRs combined onto current main) before it lands. We
  # build the COMBINED merge-group commit and post the `build` status on it so the queue's required
  # check is satisfied. The merge-group commit's TauCeti/ (all batched PRs) is overlaid onto a
  # freshly-checked-out TRUSTED base — exactly as for a single PR — so the build config stays
  # base-trusted and only TauCeti/ code is untrusted, regardless of batch size. A combined diff that
  # reaches outside TauCeti/ fails the group (the queue then bisects it); see the scope guard.
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      pr: { description: "PR number to build", required: true, type: string }

permissions:
  contents: read
  statuses: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number || inputs.pr || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      LANDRUN_SHA256: 645178e3239cd33760560834e50efea0864183a2a8a82faf199760dffee6dd71
      LANDRUN_VER: v0.1.14
      # Lake artifact-cache knobs, off by default. The "Configure the Lake artifact cache"
      # step flips these on (and sets LAKE_CACHE_DIR) ONLY when the public cache endpoints
      # are installed as repo variables; until then they stay empty and the build runs
      # exactly as before (a full recompile of TauCeti/). Declared here so the landrun
      # build's `--env` list always has a defined value to pass.
      LAKE_ARTIFACT_CACHE: ""
      LAKE_RESTORE_ARTIFACTS: ""
      LAKE_CACHE_DIR: ""
    steps:
      # --- Trusted setup: no PR code runs until the landrun build phase ---
      - name: Resolve PR head
        id: pr
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            # Build the COMBINED merge-group commit (current base + ALL batched PRs, squash-merged by
            # GitHub onto the gh-readonly-queue ref), not any single PR — so a batch is tested as a
            # whole. The combined commit lives in THIS repo; its TauCeti/ is overlaid onto the trusted
            # base below, and the required `build` status lands on the merge-group commit.
            REPO='${{ github.repository }}'
            SHA='${{ github.event.merge_group.head_sha }}'
            # Use the IMMUTABLE base SHA the queue synthesized this group on — NOT the mutable `main`
            # tip, which may have advanced since the group was formed. Building the batch's TauCeti/
            # over a different base would test (and green-light) the wrong trusted config/pins. This
            # base_sha drives the trusted base checkout, the combined-diff scope compare, and the bump
            # merge-base below.
            BASE_REF='${{ github.event.merge_group.base_sha }}'
            STATUS_SHA='${{ github.event.merge_group.head_sha }}'
            NUM="merge-group"   # not a single PR; scope/diff use the combined base..head diff below
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            NUM='${{ github.event.pull_request.number }}'
            SHA='${{ github.event.pull_request.head.sha }}'
            REPO='${{ github.event.pull_request.head.repo.full_name }}'
            BASE_REF='${{ github.event.pull_request.base.ref }}'
            STATUS_SHA="$SHA"
          else
            NUM='${{ inputs.pr }}'
            SHA=$(gh api "repos/${{ github.repository }}/pulls/$NUM"  --jq .head.sha)
            REPO=$(gh api "repos/${{ github.repository }}/pulls/$NUM" --jq .head.repo.full_name)
            BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/$NUM" --jq .base.ref)
            STATUS_SHA="$SHA"
          fi
          # Merge-base with the target branch, for the Lake-pin bump validation below:
          # check-bump.sh uses it to scope the PR's own pin delta. owner:sha for forks;
          # `|| true` so a failed substitution does not trip set -e before the fallback;
          # on any miss fall back to the tip (BASE_REF) — at worst the pre-fix behaviour.
          OWNER="${REPO%%/*}"
          MB=$(gh api "repos/${{ github.repository }}/compare/${BASE_REF}...${OWNER}:${SHA}" \
                 --jq '.merge_base_commit.sha' 2>/dev/null || true)
          [ -n "$MB" ] || { MB="$BASE_REF"; echo "::warning::merge-base unresolved; falling back to $BASE_REF tip"; }
          echo "num=$NUM"             >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"             >> "$GITHUB_OUTPUT"
          echo "repo=$REPO"           >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF"   >> "$GITHUB_OUTPUT"
          echo "mergebase=$MB"        >> "$GITHUB_OUTPUT"
          echo "status_sha=$STATUS_SHA" >> "$GITHUB_OUTPUT"
          echo "Building PR #$NUM @ $SHA from $REPO (status -> $STATUS_SHA, bump delta vs merge-base $MB)"

      - name: Scope guard — PR must touch only TauCeti/ or the root TauCeti.lean (from the trusted GitHub file list)
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            # The whole batch's combined change set vs the trusted base (every batched PR).
            files=$(gh api "repos/${{ github.repository }}/compare/${{ steps.pr.outputs.base_ref }}...${{ steps.pr.outputs.sha }}" --jq '.files[].filename')
            # The compare endpoint caps `.files` at 300. If we hit that, the list may be truncated and
            # could hide an out-of-scope path — fail closed (route to human); the queue then bisects the
            # batch into smaller groups that fit under the cap. (Realistic batches are far under 300.)
            if [ "$(printf '%s\n' "$files" | grep -c .)" -ge 300 ]; then
              echo "INFRA=1" >> "$GITHUB_ENV"
              echo "::warning::merge-group combined diff hit the compare 300-file cap — failing closed so the queue bisects"
            fi
          else
            files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.num }}/files" --jq '.[].filename')
          fi
          echo "changed files:"; echo "$files"
          # The root TauCeti.lean is allowed alongside TauCeti/: it is the (intentionally
          # empty) library root, normally untouched, but a PR may edit it. It is overlaid
          # into the sandbox below and the import-boundary guard covers it. Everything else
          # outside TauCeti/ (lakefile, scripts/, .github/) stays trusted-base-only and
          # routes to a human.
          # lake-manifest.json and lean-toolchain are also permitted, but ONLY as a
          # machine-validated forward bump: the "Validate the Lake-pin bump" step below
          # runs the trusted base scripts/check-bump.sh and routes to a human if it is
          # anything other than a forward move (mathlib forward on its nominated branch,
          # transitive pins derived from mathlib, toolchain monotonic). lakefile.* stays
          # human-owned (and check-bump fails if it changed).
          if [ -z "$files" ]; then
            echo "INFRA=1" >> "$GITHUB_ENV"; echo "::warning::no files / unable to list — routing to human"
          elif echo "$files" | grep -vqE '^TauCeti/|^TauCeti\.lean$|^lake-manifest\.json$|^lean-toolchain$'; then
            echo "INFRA=1" >> "$GITHUB_ENV"
            echo "::warning::PR changes paths outside TauCeti/ + Lake pins (infra) — not sandbox-built; needs human review"
          elif echo "$files" | grep -qE '^lake-manifest\.json$|^lean-toolchain$'; then
            echo "BUMP=1" >> "$GITHUB_ENV"
            echo "::notice::PR changes Lake pins — validating as a forward bump before building"
          fi

      - name: Diff size guard — additions, deletions, and changed files each ≤ 2000 (trusted GitHub PR totals)
        # Per-PR cap, enforced when each PR is built on pull_request_target (its entry condition to the
        # queue). A merge_group batch is the sum of already-capped PRs, so we don't re-cap the combined
        # size here. (The scope guard's 300-file compare cap still bounds the batch's file count.)
        if: ${{ github.event_name != 'merge_group' }}
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          # The file-count cap also backstops the scope guard above: the PR files API lists at
          # most 3000 files, so a huge PR could hide an out-of-scope path from that listing.
          # Failing here at 2000 files closes that gap before the API limit is reachable.
          read -r adds dels files < <(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.num }}" \
            --jq '"\(.additions) \(.deletions) \(.changed_files)"')
          echo "diff size: +$adds / -$dels across $files files (cap: 2000 each)"
          # Fail closed on non-numeric data: [ -gt ] errors on garbage but an `if` would
          # swallow that as false, silently passing the guard.
          if ! [[ "$adds" =~ ^[0-9]+$ && "$dels" =~ ^[0-9]+$ && "$files" =~ ^[0-9]+$ ]]; then
            echo "DIFF_UNKNOWN=1" >> "$GITHUB_ENV"
            echo "::error::could not read the PR's diff totals from the GitHub API (+$adds / -$dels / $files files); failing closed"
            exit 1
          fi
          if [ "$adds" -gt 2000 ] || [ "$dels" -gt 2000 ] || [ "$files" -gt 2000 ]; then
            echo "TOO_LARGE=1" >> "$GITHUB_ENV"
            echo "::error::This PR is too large to review: +$adds / -$dels lines across $files files (cap: 2000 added lines, 2000 removed lines, 2000 files). We cap diff size to keep review manageable — reviewers, AI and human alike, do far better work on small, focused PRs. Please split this into smaller PRs, one topic each. We are open to raising the cap once there is evidence that review is working well at the current size."
            exit 1
          fi

      - name: Checkout base (trusted)
        if: ${{ env.INFRA != '1' }}
        uses: actions/checkout@v4
        # Pin to the trusted base branch explicitly. For merge_group the event default ref is the
        # untrusted combined commit, so this is what keeps the build config (lakefile, scripts,
        # manifest, toolchain) base-trusted; only TauCeti/ is overlaid from the merge-group commit.
        with:
          ref: "${{ steps.pr.outputs.base_ref }}"
          path: base
          persist-credentials: false
          # Enough base history for `lake cache get` to backtrack to a recently-built
          # ancestor commit (its `--max-revs`) when the exact base tip has no cache
          # mapping yet. Harmless (just a slightly deeper fetch) when the cache is off.
          fetch-depth: 100

      - name: Checkout merge-base config (trusted ancestor — only to scope the PR's pin delta)
        if: ${{ env.INFRA != '1' && env.BUMP == '1' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.mergebase }}
          path: mergebase
          persist-credentials: false

      - name: Checkout PR head (untrusted, no credentials)
        if: ${{ env.INFRA != '1' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}
          path: pr
          persist-credentials: false

      # For a Lake-pin PR, validate it is a safe forward bump BEFORE overlaying its
      # pins or building. The validator and the BASE config it judges against are the
      # TRUSTED current target tip; mergebase/ only scopes the PR's own pin delta; pr/
      # is read as text — no PR code runs. An invalid/backward/forked bump sets INFRA=1
      # → not built, routed to a human. This same inline validation is what the
      # required `bump-guard` status is posted from in the final step (this job owns
      # both required statuses; there is no separate bump-guard workflow).
      - name: Validate the Lake-pin bump (trusted base validator) before building
        if: ${{ env.INFRA != '1' && env.BUMP == '1' }}
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if bash base/scripts/check-bump.sh base mergebase pr; then
            echo "Lake-pin bump validated — building with the PR's pins."
          else
            echo "BUMP_BAD=1" >> "$GITHUB_ENV"
            echo "INFRA=1" >> "$GITHUB_ENV"
            echo "::warning::Lake-pin change is not a validated forward bump — routing to human"
          fi

      - name: Overlay PR TauCeti/ and root TauCeti.lean onto the trusted base (reject symlinks)
        if: ${{ env.INFRA != '1' }}
        run: |
          # No symlinks in the untrusted sources (avoid read/write escapes via the build tree).
          if find pr/TauCeti -type l -print | grep -q .; then
            echo "::error::symlinks are not allowed under TauCeti/"; exit 1
          fi
          test -d pr/TauCeti && test ! -L pr/TauCeti
          rm -rf base/TauCeti
          cp -a pr/TauCeti base/TauCeti
          # Overlay the root TauCeti.lean too (a regular file, never a symlink). Only if
          # the PR actually ships one; otherwise keep the base copy.
          if [ -e pr/TauCeti.lean ]; then
            test ! -L pr/TauCeti.lean || { echo "::error::TauCeti.lean must not be a symlink"; exit 1; }
            cp -a pr/TauCeti.lean base/TauCeti.lean
          fi
          # For a validated forward bump, overlay the PR's Lake pins too, so the build
          # below actually exercises the new mathlib/toolchain (check-bump already
          # verified these are a safe forward move; lakefile.* is unchanged).
          if [ "${BUMP:-}" = "1" ]; then
            for f in lake-manifest.json lean-toolchain; do
              if [ -L "pr/$f" ]; then echo "::error::$f must not be a symlink"; exit 1; fi
              [ -e "pr/$f" ] && cp -a "pr/$f" "base/$f"
            done
          fi

      - name: Import-boundary guard (TauCeti/ and TauCeti.lean ⊬ roadmap/review)
        if: ${{ env.INFRA != '1' }}
        run: |
          if grep -rIn -E '^[[:space:]]*import[[:space:]]+(TauCetiRoadmap|TauCetiReview)\b' base/TauCeti/ base/TauCeti.lean; then
            echo "::error::TauCeti/ must not import TauCetiRoadmap or TauCetiReview"; exit 1
          fi

      - name: Install elan (trusted)
        if: ${{ env.INFRA != '1' }}
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh -o elan-init.sh
          chmod +x elan-init.sh && ./elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install landrun (pinned + checksum) and self-test (fail closed)
        if: ${{ env.INFRA != '1' }}
        run: |
          curl -sSL -H "Accept: application/octet-stream" \
            "https://github.com/Zouuup/landrun/releases/download/${LANDRUN_VER}/landrun-linux-amd64" -o landrun
          echo "${LANDRUN_SHA256}  landrun" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"; install -m 0755 landrun "$HOME/.local/bin/landrun"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          landrun --version || true
          # Prove the sandbox enforces before trusting it with PR code: run works, out-of-tree
          # write denied, /dev/shm write denied, network denied without the flag.
          set +e
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo ok' >/dev/null 2>&1; ok=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo x > /etc/landrun-probe' >/dev/null 2>&1; wr=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo x > /dev/shm/landrun-probe' >/dev/null 2>&1; shm=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'curl -sS --max-time 8 https://example.com >/dev/null' >/dev/null 2>&1; net=$?
          set -e
          echo "self-test: run=$ok write=$wr shm=$shm net=$net (nonzero = denied for w/shm/net)"
          if [ $ok -ne 0 ] || [ $wr -eq 0 ] || [ $shm -eq 0 ] || [ $net -eq 0 ]; then
            echo "::error::landrun not enforcing (run=$ok write=$wr shm=$shm net=$net); refusing to run PR code"; exit 1
          fi

      # `lake exe cache get` runs the `cache` exe built from the pinned Mathlib, unsandboxed,
      # with network (to download oleans) but deliberately NO token in env. For a normal PR that
      # is the trusted base Mathlib. For a validated bump it is the PR's Mathlib pin — which
      # bump-guard proved is a *forward commit on Mathlib's own master* (same repo, never a fork),
      # so the code run here is still trusted Mathlib master under the project's "track master"
      # policy; only the PR's TauCeti/ code stays untrusted and runs solely under landrun below.
      - name: Fetch Mathlib with the (bump-validated) config (network, no token; no PR code)
        if: ${{ env.INFRA != '1' }}
        run: ( cd base && lake exe cache get ) && mkdir -p base/.lake/tmp

      # Enable Lake's built-in artifact cache for the build below ONLY when the public read
      # endpoints are configured (repo variables). Until then this is a no-op: LAKE_*
      # stay empty and the landrun build recompiles TauCeti/ from scratch exactly as before.
      # The cache dir lives under base/.lake/ so the offline landrun build (which mounts
      # base/.lake rw) can read what the network `lake cache get` step populates. We never
      # pass the cache *endpoints* into landrun, so the sandboxed build stays offline and
      # can only consult the locally-populated cache.
      - name: Configure the Lake artifact cache (no-op unless the public endpoints are set)
        if: ${{ env.INFRA != '1' }}
        env:
          PUBLIC_ARTIFACT_ENDPOINT: ${{ vars.LAKE_CACHE_ARTIFACT_ENDPOINT_PUBLIC }}
          PUBLIC_REVISION_ENDPOINT: ${{ vars.LAKE_CACHE_REVISION_ENDPOINT_PUBLIC }}
        run: |
          if [ -n "$PUBLIC_ARTIFACT_ENDPOINT" ] && [ -n "$PUBLIC_REVISION_ENDPOINT" ]; then
            {
              echo "LAKE_CACHE_DIR=$PWD/base/.lake/cache"
              echo "LAKE_ARTIFACT_CACHE=true"
              echo "LAKE_RESTORE_ARTIFACTS=true"
              echo "TAUCETI_CACHE_ENABLED=1"
            } >> "$GITHUB_ENV"
            echo "::notice::Lake artifact cache enabled — will fetch TauCeti's oleans and build incrementally"
          else
            echo "::notice::Lake artifact cache not configured — building TauCeti/ from scratch (set the LAKE_CACHE_*_PUBLIC repo variables to enable)"
          fi

      # Anonymous GETs from the PUBLIC read host (a different host than the S3 API endpoint
      # the trusted main upload uses). Looks up TauCeti's OWN root-package oleans for the
      # base-branch revision — backtracking up to --max-revs ancestors — and unpacks them
      # into the local Lake cache ($LAKE_CACHE_DIR). This is trusted, main-built data: no
      # token is in reach and no PR code runs (lakefile.toml is declarative + base-trusted).
      # Mathlib's oleans are NOT here; they come from `lake exe cache get` above. A miss is
      # non-fatal — the landrun build just recompiles from scratch, as when the cache is off.
      - name: Fetch TauCeti's own oleans from the Lake cache (network, no token; no PR code)
        if: ${{ env.INFRA != '1' && env.TAUCETI_CACHE_ENABLED == '1' }}
        env:
          # Passed under non-LAKE_ names so Lake never sees the deprecated endpoint
          # environment variables; we hand it the endpoints through a `--service` config.
          PUBLIC_ARTIFACT_ENDPOINT: ${{ vars.LAKE_CACHE_ARTIFACT_ENDPOINT_PUBLIC }}
          PUBLIC_REVISION_ENDPOINT: ${{ vars.LAKE_CACHE_REVISION_ENDPOINT_PUBLIC }}
        run: |
          # Define the public read service in a Lake system config and select it with
          # `--service` (the env-var form of endpoint config is deprecated). Anonymous
          # GETs, so no key here.
          CFG="$RUNNER_TEMP/lake-cache.toml"
          cat > "$CFG" <<TOML
          cache.defaultService = "tauceti-public"
          [[cache.service]]
          name = "tauceti-public"
          kind = "s3"
          artifactEndpoint = "$PUBLIC_ARTIFACT_ENDPOINT"
          revisionEndpoint = "$PUBLIC_REVISION_ENDPOINT"
          TOML
          ( cd base && LAKE_CONFIG="$CFG" lake cache get --service tauceti-public --repo FormalFrontier/TauCeti ) \
            || echo "::warning::lake cache get failed or missed; building TauCeti/ from scratch"

      - name: Build (trusted config + overlaid TauCeti/) under landrun, offline
        id: build
        if: ${{ env.INFRA != '1' }}
        env:
          # The sandboxed build is always offline: never let Lake reach out to a remote
          # cache from inside landrun. When the artifact cache is enabled above, it restores
          # TauCeti's oleans purely from the locally-populated $LAKE_CACHE_DIR; when it is
          # not, this is a normal full build. Either way, no network from in here.
          LAKE_NO_CACHE: "true"
        run: |
          export PATH="$HOME/.local/bin:$HOME/.elan/bin:$PATH"
          landrun --rox /usr --rox /etc \
            --rw /dev/null --rox /dev/zero --rox /dev/urandom --rox /dev/random \
            --rox "$HOME/.elan" --rox "$PWD/base" --rw "$PWD/base/.lake" \
            --env PATH --env HOME --env CI \
            --env LAKE_NO_CACHE --env LAKE_ARTIFACT_CACHE --env LAKE_RESTORE_ARTIFACTS --env LAKE_CACHE_DIR \
            -- bash -euxo pipefail -c '
              cd base
              export TMPDIR="$PWD/.lake/tmp"
              lake build
              lake exe axioms
            '

      - name: Report build and bump-guard statuses to the PR head commit
        if: always()
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          # bump-guard: this job already ran the trusted base scripts/check-bump.sh inline
          # (the "Validate the Lake-pin bump" step), so we post the required `bump-guard`
          # status from its result here rather than from a separate workflow. BUMP_BAD is set
          # only when a manifest/toolchain change failed that validator; anything else (no pin
          # change, or a validated forward bump) is a pass. Posting it from this job also means
          # both required statuses land together, before the auto-merge workflow_run fires.
          if [ "${{ env.BUMP_BAD }}" = "1" ]; then
            bg_state=failure; bg_desc="manifest/toolchain change is not a validated forward bump — needs human review"
          else
            bg_state=success; bg_desc="forward-only Lake-pin / toolchain bump (or no pin change)"
          fi
          gh api -X POST "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.status_sha }}" \
            -f state="$bg_state" -f context="bump-guard" -f description="$bg_desc" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "posted bump-guard=$bg_state ($bg_desc) to ${{ steps.pr.outputs.status_sha }}"

          if [ "${{ env.BUMP_BAD }}" = "1" ]; then
            state=failure; desc="Lake-pin change is not a validated forward bump — human review + merge required"
          elif [ "${{ env.INFRA }}" = "1" ]; then
            state=failure; desc="changes outside TauCeti/ — human review + merge required"
          elif [ "${{ env.TOO_LARGE }}" = "1" ]; then
            state=failure; desc="diff exceeds 2000 added/removed lines or 2000 files — split into smaller PRs to keep review manageable"
          elif [ "${{ env.DIFF_UNKNOWN }}" = "1" ]; then
            state=failure; desc="could not read PR diff totals from the GitHub API — re-run pr-build"
          elif [ "${{ steps.build.outcome }}" = "success" ]; then
            state=success; desc="sandboxed build + axiom audit passed (trusted config)"
          else
            state=failure; desc="sandboxed build or axiom audit failed"
          fi
          gh api -X POST "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.status_sha }}" \
            -f state="$state" -f context="build" -f description="$desc" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "posted build=$state ($desc) to ${{ steps.pr.outputs.status_sha }}"
          [ "$state" = "success" ]
