name: pr-build

# Builds untrusted PR code in a TRUSTED, base-branch-defined workflow. A PR cannot change what
# runs here (pull_request_target uses the base definition). The build/audit configuration
# (lakefile, Scripts/, manifest, toolchain) is always the TRUSTED base's: we overlay only the
# PR's `TauCeti/` sources onto a base checkout and build that. Any PR touching anything outside
# `TauCeti/` is routed to a human (it can't be validated with trusted config). PR `TauCeti/` code
# compiles only under landrun (offline; writes confined to base/.lake; no secrets or token in
# reach). The `build` commit status on the PR head SHA is the required merge check.
#
# Live on pull_request_target (fires for all PRs, incl. forks, from the trusted base definition).
# workflow_dispatch is also kept for ad-hoc re-testing of a given PR number.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr: { description: "PR number to build", required: true, type: string }

permissions:
  contents: read
  statuses: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      LANDRUN_SHA256: 645178e3239cd33760560834e50efea0864183a2a8a82faf199760dffee6dd71
      LANDRUN_VER: v0.1.14
    steps:
      # --- Trusted setup: no PR code runs until the landrun build phase ---
      - name: Resolve PR head
        id: pr
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            NUM='${{ github.event.pull_request.number }}'
            SHA='${{ github.event.pull_request.head.sha }}'
            REPO='${{ github.event.pull_request.head.repo.full_name }}'
          else
            NUM='${{ inputs.pr }}'
            SHA=$(gh api "repos/${{ github.repository }}/pulls/$NUM" --jq .head.sha)
            REPO=$(gh api "repos/${{ github.repository }}/pulls/$NUM" --jq .head.repo.full_name)
          fi
          echo "num=$NUM"   >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"   >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "Building PR #$NUM @ $SHA from $REPO"

      - name: Scope guard — PR must touch only TauCeti/ or the root TauCeti.lean (from the trusted GitHub file list)
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.num }}/files" --jq '.[].filename')
          echo "changed files:"; echo "$files"
          # The root aggregator TauCeti.lean is allowed alongside TauCeti/: it holds
          # only `import TauCeti.*` lines (so new modules can be made reachable from
          # the root), it is overlaid into the sandbox below, and the import-boundary
          # guard covers it. Everything else outside TauCeti/ (lakefile, Scripts/,
          # .github/) stays trusted-base-only and routes to a human.
          if [ -z "$files" ]; then
            echo "INFRA=1" >> "$GITHUB_ENV"; echo "::warning::no files / unable to list — routing to human"
          elif echo "$files" | grep -vqE '^TauCeti/|^TauCeti\.lean$'; then
            echo "INFRA=1" >> "$GITHUB_ENV"
            echo "::warning::PR changes paths outside TauCeti/ (infra) — not sandbox-built; needs human review"
          fi

      - name: Diff size guard — additions, deletions, and changed files each ≤ 2000 (trusted GitHub PR totals)
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          # The file-count cap also backstops the scope guard above: the PR files API lists at
          # most 3000 files, so a huge PR could hide an out-of-scope path from that listing.
          # Failing here at 2000 files closes that gap before the API limit is reachable.
          read -r adds dels files < <(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.num }}" \
            --jq '"\(.additions) \(.deletions) \(.changed_files)"')
          echo "diff size: +$adds / -$dels across $files files (cap: 2000 each)"
          # Fail closed on non-numeric data: [ -gt ] errors on garbage but an `if` would
          # swallow that as false, silently passing the guard.
          if ! [[ "$adds" =~ ^[0-9]+$ && "$dels" =~ ^[0-9]+$ && "$files" =~ ^[0-9]+$ ]]; then
            echo "DIFF_UNKNOWN=1" >> "$GITHUB_ENV"
            echo "::error::could not read the PR's diff totals from the GitHub API (+$adds / -$dels / $files files); failing closed"
            exit 1
          fi
          if [ "$adds" -gt 2000 ] || [ "$dels" -gt 2000 ] || [ "$files" -gt 2000 ]; then
            echo "TOO_LARGE=1" >> "$GITHUB_ENV"
            echo "::error::This PR is too large to review: +$adds / -$dels lines across $files files (cap: 2000 added lines, 2000 removed lines, 2000 files). We cap diff size to keep review manageable — reviewers, AI and human alike, do far better work on small, focused PRs. Please split this into smaller PRs, one topic each. We are open to raising the cap once there is evidence that review is working well at the current size."
            exit 1
          fi

      - name: Checkout base (trusted)
        if: ${{ env.INFRA != '1' }}
        uses: actions/checkout@v4
        with: { path: base, persist-credentials: false }

      - name: Checkout PR head (untrusted, no credentials)
        if: ${{ env.INFRA != '1' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}
          path: pr
          persist-credentials: false

      - name: Overlay PR TauCeti/ and root TauCeti.lean onto the trusted base (reject symlinks)
        if: ${{ env.INFRA != '1' }}
        run: |
          # No symlinks in the untrusted sources (avoid read/write escapes via the build tree).
          if find pr/TauCeti -type l -print | grep -q .; then
            echo "::error::symlinks are not allowed under TauCeti/"; exit 1
          fi
          test -d pr/TauCeti && test ! -L pr/TauCeti
          rm -rf base/TauCeti
          cp -a pr/TauCeti base/TauCeti
          # Overlay the root aggregator too (it is a regular file of imports, never a
          # symlink). Only if the PR actually ships one; otherwise keep the base copy.
          if [ -e pr/TauCeti.lean ]; then
            test ! -L pr/TauCeti.lean || { echo "::error::TauCeti.lean must not be a symlink"; exit 1; }
            cp -a pr/TauCeti.lean base/TauCeti.lean
          fi

      - name: Import-boundary guard (TauCeti/ and TauCeti.lean ⊬ roadmap/review)
        if: ${{ env.INFRA != '1' }}
        run: |
          if grep -rIn -E '^[[:space:]]*import[[:space:]]+(TauCetiRoadmap|TauCetiReview)\b' base/TauCeti/ base/TauCeti.lean; then
            echo "::error::TauCeti/ must not import TauCetiRoadmap or TauCetiReview"; exit 1
          fi

      - name: Install elan (trusted)
        if: ${{ env.INFRA != '1' }}
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh -o elan-init.sh
          chmod +x elan-init.sh && ./elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install landrun (pinned + checksum) and self-test (fail closed)
        if: ${{ env.INFRA != '1' }}
        run: |
          curl -sSL -H "Accept: application/octet-stream" \
            "https://github.com/Zouuup/landrun/releases/download/${LANDRUN_VER}/landrun-linux-amd64" -o landrun
          echo "${LANDRUN_SHA256}  landrun" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"; install -m 0755 landrun "$HOME/.local/bin/landrun"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          landrun --version || true
          # Prove the sandbox enforces before trusting it with PR code: run works, out-of-tree
          # write denied, /dev/shm write denied, network denied without the flag.
          set +e
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo ok' >/dev/null 2>&1; ok=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo x > /etc/landrun-probe' >/dev/null 2>&1; wr=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'echo x > /dev/shm/landrun-probe' >/dev/null 2>&1; shm=$?
          landrun --rox /usr --rox /etc --rw /dev/null -- bash -c 'curl -sS --max-time 8 https://example.com >/dev/null' >/dev/null 2>&1; net=$?
          set -e
          echo "self-test: run=$ok write=$wr shm=$shm net=$net (nonzero = denied for w/shm/net)"
          if [ $ok -ne 0 ] || [ $wr -eq 0 ] || [ $shm -eq 0 ] || [ $net -eq 0 ]; then
            echo "::error::landrun not enforcing (run=$ok write=$wr shm=$shm net=$net); refusing to run PR code"; exit 1
          fi

      - name: Fetch Mathlib with the trusted base config (network; no PR code)
        if: ${{ env.INFRA != '1' }}
        run: ( cd base && lake exe cache get ) && mkdir -p base/.lake/tmp

      - name: Build (trusted config + overlaid TauCeti/) under landrun, offline
        id: build
        if: ${{ env.INFRA != '1' }}
        run: |
          export PATH="$HOME/.local/bin:$HOME/.elan/bin:$PATH"
          landrun --rox /usr --rox /etc \
            --rw /dev/null --rox /dev/zero --rox /dev/urandom --rox /dev/random \
            --rox "$HOME/.elan" --rox "$PWD/base" --rw "$PWD/base/.lake" \
            --env PATH --env HOME --env CI \
            -- bash -euxo pipefail -c '
              cd base
              export TMPDIR="$PWD/.lake/tmp"
              lake build
              lake exe axioms
            '

      - name: Report build status to the PR head commit
        if: always()
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if [ "${{ env.INFRA }}" = "1" ]; then
            state=failure; desc="changes outside TauCeti/ — human review + merge required"
          elif [ "${{ env.TOO_LARGE }}" = "1" ]; then
            state=failure; desc="diff exceeds 2000 added/removed lines or 2000 files — split into smaller PRs to keep review manageable"
          elif [ "${{ env.DIFF_UNKNOWN }}" = "1" ]; then
            state=failure; desc="could not read PR diff totals from the GitHub API — re-run pr-build"
          elif [ "${{ steps.build.outcome }}" = "success" ]; then
            state=success; desc="sandboxed build + axiom audit passed (trusted config)"
          else
            state=failure; desc="sandboxed build or axiom audit failed"
          fi
          gh api -X POST "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }}" \
            -f state="$state" -f context="build" -f description="$desc" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "posted build=$state ($desc) to ${{ steps.pr.outputs.sha }}"
          [ "$state" = "success" ]
