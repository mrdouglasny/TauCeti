name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The two-library split is build convenience, not a trust boundary.
      # This guard is what actually stops the AI-owned library from inheriting
      # sorried declarations: TauCeti/ may not import the roadmap/review trees.
      - name: Import-boundary guard (TauCeti/ ⊬ roadmap/review)
        run: |
          if grep -rIn -E '^[[:space:]]*import[[:space:]]+(TauCetiRoadmap|TauCetiReview)\b' TauCeti/; then
            echo "::error::TauCeti/ must not import TauCetiRoadmap or TauCetiReview"
            exit 1
          fi

      # No sorries in the AI-owned library. (The #print axioms allowlist audit
      # is a planned TauCetiReview/ follow-up; this is the cheap textual guard.)
      - name: No-sorry guard (TauCeti/ is sorry-free)
        run: |
          if grep -rIn -E '\b(sorry|admit|sorryAx)\b' TauCeti/; then
            echo "::error::TauCeti/ must not contain sorry / admit / sorryAx"
            exit 1
          fi

      - name: Build
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          # Fetch prebuilt oleans from Mathlib's own cache server (`lake exe
          # cache get`); this takes only a few seconds and never builds Mathlib.
          use-mathlib-cache: true
          # Skip lean-action's GitHub `actions/cache` of `./.lake`. That archive
          # is ~2.4 GB; saving and restoring it costs ~40s per run, far more than
          # the ~6s `lake exe cache get` it would save. Net win to leave it off.
          use-github-cache: false
